<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Tamil Actors</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      padding: 24px;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
      color: #38bdf8;
      letter-spacing: 1px;
    }

    .grid {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px;
      backdrop-filter: blur(10px);
      box-shadow: 0 12px 30px rgba(0,0,0,0.35);
      transition: transform .2s ease, box-shadow .2s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    }

    .name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #7dd3fc;
      margin-bottom: 6px;
    }

    .nickname {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .row {
      font-size: 0.85rem;
      margin-bottom: 6px;
      color: #cbd5f5;
    }

    .chips span {
      display: inline-block;
      margin: 4px 6px 0 0;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 0.7rem;
      background: #0ea5e9;
      color: #00131f;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <h1>🎬 Popular Tamil Actors</h1>
  <div class="grid" id="actorsGrid"></div>

  <script>
    const data = [
      { "id": 1, "name": "Vijay", "nickname": "Thalapathy", "born": "1974-06-22", "knownFor": ["Action", "Dance", "Mass roles"] },
      { "id": 2, "name": "Ajith Kumar", "nickname": "Thala", "born": "1971-05-01", "knownFor": ["Stylish roles", "Action", "Bike racing"] },
      { "id": 3, "name": "Rajinikanth", "nickname": "Superstar", "born": "1950-12-12", "knownFor": ["Style", "Screen presence", "Mass appeal"] },
      { "id": 4, "name": "Suriya", "nickname": "Nadippin Nayagan", "born": "1975-07-23", "knownFor": ["Versatile acting", "Emotional roles", "Social themes"] },
      { "id": 5, "name": "Dhanush", "nickname": "D", "born": "1983-07-28", "knownFor": ["Natural acting", "Dance", "Rural roles"] }
    ];

    const grid = document.getElementById("actorsGrid");

    data.forEach(actor => {
      const card = document.createElement("div");
      card.className = "card";

      const born = new Date(actor.born).toLocaleDateString("en-GB", {
        day: "2-digit", month: "short", year: "numeric"
      });

      const chips = actor.knownFor.map(tag => `<span>${tag}</span>`).join("");

      card.innerHTML = `
        <div class="name">${actor.name}</div>
        <div class="nickname">Nickname: ${actor.nickname}</div>
        <div class="row">🎂 Born: ${born}</div>
        <div class="row">Known for:</div>
        <div class="chips">${chips}</div>
      `;

      grid.appendChild(card);
    });
  </script>

</body>
</html>
